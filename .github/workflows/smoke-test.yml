name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to test
        required: false
        default: main

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run bundle
      - run: node ./bundle/gemini.js --version
